# Server
server.port=3000

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/matchme
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable JPA auto-ddl (we use our own SQL migrations)
spring.jpa.hibernate.ddl-auto=none

# JWT
jwt.secret=this-is-a-very-long-secret-key-that-is-at-least-32-chars-long
jwt.expiration=86400000

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.dir=uploads

# CORS origins
cors.allowed-origins=http://localhost:5173,http://localhost:5174

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration